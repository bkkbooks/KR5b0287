body:
  text: 天地變易第一欲要知天地變易晝夜不分暈晦飄黑風黃沙推山拔樹日月不見星宿無光可使白絹三尺書陷天符念混天呪置於山上無人淨境西北正立髙峯符呪一百徧擲符於地一手指天呼速字三聲立便下山不得返顧須臾狂風四起人面不分只聞雷皷之聲髙低平蕩河海俱平此術一用不可再行恐損生靈凡遇劫盡用之從來劔仙爭占洞府俱用此法不可試於俗士混天呪曰攝天都使太一雷君風伯兩師雷電掌籍司官速使六丁六甲大力天神祛攝毒龍並起法門指山山摧指海海枯吾奉九天上帝敕九天陷天符移天換宿第二凡欲移換宿大星奔落小星移位南斗不見北斗伏藏先須持誦威天大法神呪千徧又於中庭内夜靜用酒果香燈三十三天位牌上書天人姓名供養畢依然有丈餘大人影各依位上見不得驚動但只欵欵言曰吾奉三十三天帝君命汝等日夜不離持之門但逐位上名字用絳紗袋盛之隨身勿令人見遇有用時只於袋中取一名字香上度過向使者星靈擲姓名三徧呼落字七聲不得放姓名恐後來難使如兩陣軍前乃可用之佐國扶家立置太平之國人常見星宿變易方知主聖臣賢盡皆心歸非常不得輕三十三天聖位第一天人初耶漢樞第二天人初沙隠郍第三天人初羅屈京第四天人梵商樞機第五天人梵沙仲伯第六天人梵化津商第七天人金梵初沙第八天人梵元初通第九天人靖梵初沙第十天人靖梵藥又第十一天人靖梵光初耶第十二天人定化光初耶第十三天人定化惠光初耶第十四天人定惠逺光尊第十五天人順梵化德尊第十六天人藥師化定尊第十七天人藥師梵定尊第十八天人藥師惠達尊第十九天人樞惠大金尊第二十天人茄耶中光尊第二十一天人施露大梵尊第二十二天人施迷大金尊第二十三天人變通語化君第二十四天人順光起光仙君第二十五天人初樞大覺君第二十六天人初耶大覺君第二十七天人昇伯仙化君第二十八天人昇露大化君第二十九天人惠介大化君第三十天人宿惠大化君第三十一天人宿憂大化君第三十二天人疾路大仙君第三十三天人慈攝仙施號君威天大法神呪吾奉威天大法江河日月山海星辰在吾掌中吾使明即明暗即暗三十三天神在吾法之下使東即東使西即西使南即南使北即北從吾封侯不從吾令者斬首施行急准都天帝君敕令煞攝夜半換日出第三欲要夜半換日岀可用朱砂二塊自方徑寸用淨水磨圓白膠香共入絳紗袋内盛之常安浄處香花供養百日畢常隨身帶之如用時獨於淨灘上面東手持朱砂念扶桑帝君千徧须臾以燈焰明如圓光夜半大明所有天下含靈之物皆得生成若遇帝君出或乃用之㝷常不用晦朔換月第四欲要晦朔換月用明者水晶徑三寸者令圓用楓子篇如月一枝可水晶大置於雷木匣中用白膠香滿塡淨處香燈供養不令婦人相近候匣中有白光即取用之白絹袋盛之隨身帶遇用時只置香卓上香花淨水用之可佐國軍行前用之念呪曰太陽之精與吾權於法門明照四域不得稍有違吾法令吾奉太陽行度之君敕令煞攝却落彗星第五宿夜見埋者木人處有人來報天心之事不得驚怖後來漸漸近前不懼持法之人其桐木人子每日常在持法人之左右有天上地下人間國事預來取報不得試於無道之士不比尋常法不可占小人避之念太一飛星呪曰太一使行天罡姓名斬除妖星當吾者死背吾者亡順吾者昌吾奉北極帝君律令敕攝廻風滅雷第六凡遇廻風滅雷用棗木楓木雕回風印望風雲雷電雹處用印迎之預前用桃栁湯浴印一百日用白膠香浴印一百日莫令人見置神堂前香花供養如遇大風雷雨閉炁默念六丁呪曰六丁急降六甲齊臨神通大闡與吾廻風急急如帝君律令敕廻風滅雷印式回溪驀林第七諸葛公權曰先修煉内丹就行仁義禮樂孝養之全然後用術渡溪驀林河海皆可坐遇一法於端午絶早出門無人處用草棠作四方壇一丈二尺淨蓆一領置於中心酒果鹿脯蛇肉各五分面東拜香欵曰弟子某今日持誦金翅烏王呪萬徧助弟子渡過江河大林湖海其酒果各位上自喫少許其餘更不得要返廻家房内卧一日至次日起如常念金趐烏王呪曰日月合精吾言鄧林金翅烏王助吾羽翼遏林如風履水如石吾奉皇人帝君律令敕攝虎狼伏藏第八虎狼禽蟲之術乃可卓庵修道初第未達真理之時哀哉萬類隂魂鬼毒蟲子相魔滅至使志人不達真理豈不容哉如要虎狼伏藏先持念禁山呪一萬徧然後群蟲虎狼跨如家畜乃可安心進道日以功成乃是術家大要也禁山呪曰吾是天丁攝統山神辟除虎狼千里之行吾奉太上律令救煞攝真人化育法第九河上公據草庵之志而得化育乘機之理諸葛公權深達化育之機乃可穿山入石今來修道之士只述吐納運用金精豈成大術真可笑哉如要變化穿山入石乘虛跨露育化萬類於歳八節日持念大力神呪萬遍若要用時念呪所覩之物皆可投入不得尋常輕用大力神呪曰唵囉咈啼咶化呿呿育多嚩大力咈攝仰祈内居娑婆訶魁罡六銷秘法太上老君戒經力一戒上老君西遊將之天竺周幽王之末也周而西之于天竺天竺國名也事出玄妙内篇以道徳二經授關令尹喜喜受經畢又請持身奉經之法授經之事具載記傳此略序請戒之端耳受經既竟理應宣通故重請奉經持身持身之法備在經文但文㫖深微非始學便曉故别請其要以斬後語者也老君於是復授喜要戒普令一切咸持度世謂但持戒去惡自得度世然持戒者乃爲奉經奉經者必在求道今既聞奉持之法且舉戒而言也於是說頌三章頌者美其事也明持戒奉法並爲道之因故先誦其宗致以悟始學令知其指歸也初章明持戒所得身心福漸次章明其法既普家國咸興天人同慶後章明自漸之深理窮於經經理既窮乃至成真故有三章也樂法以爲妻妻者栖也謂相依栖也隂陽肇氣人倫之道莫不由夫妻生我者矣樂者謂並有待而相樂也一切衆生咸知樂妻若栖心法教則無待返偶而生理自足又明樂法能如樂妻則能持身奉經也愛經如珠玉法語其所宗經指其所學愛者寳愛也世之所寳莫過珠玉而世寳無益於心經法有永於得故令學人去彼而取此也持戒制六情六情者六欲也眼欲滛色耳欲滛聲鼻欲芬芳舌欲脂味身欲柔滑意欲放泆如此六事皆成乎心故爲之情也並是三塗惡業故制而去也若不檢制縱恣六情生爲世人所惡死爲鬼之所迫也念道遣所欲戒以防外念心攝内内攝由念道念道則所欲外亡西昇經云道之微心子未能别撮取於要慎戒勿失先損諸欲莫令意泆即此戒者也淡泊正氣庭人之所以躁競者由是六情之所使也若持戒念道則六情澄靜神安氣正邪惑所不能擾庭者黄庭也蕭然神靜黙蕭然無欲也靜黙内定也天魔並敬護魔謂五帝大魔也領人生死在六天之上若持戒奉法終獲真仙則超於三界故並爲其所敬護也魔有四種餘三在人身中故曰天魔世世受大福謂持戒念道衆惡不生善因日建雖經生死今身後身常在福中及至成道故云大也鬱鬱家國盛濟濟經道興謂持戒之福命無夭傷見世昌盛子孫繁茂有家有國建至十方莫不鬱然而盛者也天人同其願天謂天上仙也人謂世中人也言持戒奉法始在人中受報生天進業人中受報生天進業乃至上清是故天人同其願也飄眇入大乗大乗謂上清法也縁麄必至妙階漸自之深既離世昇天從天之上故云飄眇飄眇猶勢飄然也飛騰之貌矣因心立福田福者善之果也爲福之因不由於他已心即福田也若修身奉法衆惡自除猶如治田去其草穢草穢既盡自獲良榖者也靡靡法輪升靡靡猶漸漸也福既積則法輪漸升之也七祖生天堂身獲道真七祖蒙慶我身白日騰持戒志道功成徳就之所至也大道洞玄虚一切諸法皆稱爲道乃有百官及萬八千種並是六天及三界之道大道者无形无象洞玄虚道無不在理無不應故云大也有念無不啓啓謂感也此明持戒念道有心即感念念不止以至成道莫非念力練質入仙真欲多則神濁氣清則質練練質成真莫不由戒遂成金剛體言其表裏堅真无復朽敗者也超度三界難欲界色界無色界此三界生死輪轉無休恒與三塗對治故云難也自非成真莫能超者也地獄五苦解五苦是地獄中寒池火車鑊湯刀山劔樹也解脫既超三界無復苦縁也亦謂五道爲五苦者也悉歸太上經上清法也衆法所窮故云歸太上經也靜念稽首禮誦說既竟法縁略顯今將說戒故令靜念稽首而受也於是尹喜聞說頌巳稽首而立請受戒言老君曰第一戒殺第二戒盜第三戒婬第四戒妄語第五戒酒是爲五戒若清信男清信女若有男女發心受戒便得清信之號奉持五戒畢命不犯謂持戒至于命終而不能犯也是爲清信男清信女向發心即號清信若中塗虧缺則清信心廢唯盡命不犯來生又受福果則全清信之理故重云爾老君曰戒殺者一切衆生含氣以上翾飛蠕動之類皆不得殺蠕動之類無不樂生自蚊蟻蜒蚰咸知避死也老君曰戒盜者一錢以上有主無主非已之物皆不妄取在地地官在水水官在人人主如是則無無主之物此言無主者謂當時無誌護也老君曰戒婬者非夫婦若出家人不妻不娶若男若女皆不得犯夫妻雖非犯戒過亦爲婬犯老君曰戒妄語者若不聞不見非心所了而向人說皆爲妄語所說事與心相違也復有綺言謟曲反覆兩舌在後戒也老君曰戒酒者非身病非法禮皆不得飲身病謂巳身疾必應以酒也法禮者明非世俗饌㑹及鬼神之胙若尊卑之禮真靈之饗則不至於失之者也老君曰是五戒者持身之本持法之根身本無惡縁惡持戒心淨身清可以奉法故曰法根者也善男子善女人前章云清信者明受戒攺惡乃得此號此言善者謂生而善也是禀業所得非持戒而起願樂善法一切法也縁有宿善故能願樂受持終身不犯犯爲虧缺不全首尾毀爲毀慢生不信心是爲清信得經得法永成道真夫得經者不必能修行能修行者乃爲得法耳得法則得道故云永成永謂逺者也於是尹喜聞受既巳巳謂巳畢也聞說戒言而親受之非如五千是老子自出再拜而問何故有五言人之爲惡其事萬萬方皆應防戒今何故止說有五也老君曰五者攝一切惡言一切衆惡皆起此五若持此五戒則衆惡悉絶也猶天有五精以攝萬靈五精星也靈謂神靈地有五行以攝群生金木水火土也群生所禀莫不資之人有五藏以攝神明人所以有神明之識者由於五藏也六情五欲各有所生故以五戒對而治之明此五戒自天至人三才之本非始有也戒者防也防其失也未失則防而不爲既失則戒而不犯皆是防其義者也失而不防則三塗盈逸天人虚空不防其失則縱惡日多惡縁報對則充滿三塗三塗既盛則鬼道横逸夫一切衆生皆有定數三塗既滿則天堂虚空生人咸少也是故五也明五戒根本所由如此也尹喜曰大乎戒也何故失耶既聞斯㫖方歎其大言有此戒其來久矣云何衆生猶有此失老君曰本得無失既失而得亦無所失本得無失謂前身過去巳得此戒故於今身而無失也而今身有失者前身無戒或有而違犯故有失耳雖爲有失而於今身得受持者則見生無失後身復善故既失而得亦無所失前頌云世世受大福即此義也尹喜所問一失而併舉三失答之是對其後問頓顯前身此生後身也明人禀道本自無失義見經中也尹喜曰敢問其本得失既顯事理須明故却問其本以求其末也老君曰今當爲爾具說其本順其所問而言其所以故云具諦聽諦聽受持普爲一切之所知也諦聽戒其闕失諦受使無漏妄然後可令一切咸得知聞尹喜再拜恭立而聽恭立者即今長跪也老君曰五戒者天地並始萬物並有舉其本也夫有天地則有萬物有萬物則有得失有得失則有法戒之者也持之者吉失之者㐫善果爲吉惡對爲㐫吉㐫之事悉備後章過去成道莫不由之言凡得道者莫不縁於戒者也故其神二十五也五五之數也内經有二十五神是人身之靈上應天真而鎮在人身持戒身清則其神常安經文五千是其義也謂失之事備在五千而後此戒者特應尹喜所請耳老君曰五戒者在天爲五緯東曰歳星西曰太白星南曰熒惑星北曰辰星中央曰鎮星也天道失戒則見災祥五星各位一方行度氣色並各有常若天運失和隂陽愆戾皆非其分度而見妖徵故經云天無以清將恐裂裂謂王者失德隂陽圯裂五緯返常也在地爲五嶽東曰太山南曰衡山西曰華山北曰恒山中央曰嵩髙山也地道失戒則百穀不成五嶽各鎮其方風雲水雨之所由也若地道失戒則疾風涌水曠旱之災百穀不實也一切草木皆謂之穀經言地無以寧將恐發謂山崩川竭萬物災傷皆由王者咎先見兆於天次降災於地也在數爲五行東方木九南方火三西方金七北方水五中央土十二雖中央而位在四季五數失戒則水火相薄金木相傷五數推移四時以成若其有失則災癘刀兵西昇經曰五行不相剋萬物盡可全也在治爲五帝東方太皥木南方炎帝火西方少皥金北方顓頊水中央黄帝土也五帝失戒則祚夭身亡五帝爲帝王更治五行相生隨方受任若失戒暴虐則國祚不長身不獲壽也在人爲五藏肝屬木心屬火肺屬金腎屬水脾屬土也五藏失戒則性發狂所行過惡則五藏失神五藏失神則令人性狂狂謂僻也㝷五戒以防五惡爲惡各有所生但一惡便使性狂不待五也今言五者緫其數耳經云馳騁田獵令人心發狂心爲五藏之主故舉其一也故後章云失一則命不成又㝷戒㫖自天及人皆云失戒而致災祥者明爲患之起起自由人是以帝王有慶兆民頼之如有不善則天下受殃故知三才等治得失必同又自天至人雖有五條爲失之本在人而已故次章云戒於此者而順於彼也老君曰是五者戒於此而順於彼謂上來五事悉在於人故云戒於此也順於彼者理也夫患之所生由於違理若順理而行復何戒乎明爲戒於過耳若過而不戒禍患之興豈可禳也故殺戒者東方也受生之氣尚於長養而人犯殺則肝受其害氣數相感自内于外肝主長養故一切咸知慕生懷殺之性則逆氣衝肝肝氣㐫壯還自災身故云害也盗戒者北方也太隂之精主於閉藏而人爲盗則腎受其殃腎爲太隂隂主閉藏故一切咸知收歛而人爲盗則腎氣爲傷故云殃也殃者積惡之應者也婬戒者西方也少隂之質男女貞固而人好婬則肺受其沴肺爲少隂金性堅貞故男正女潔而人好婬則肺氣枯竭故云沴沴惡氣也旱災曰沴也酒戒者南方火也太陽之氣物以之成而人好酒則心受其毒心爲一身之主以成乎人是太陽之氣也好酒之人則毒衝于心藏府荒廢以致迷䘮者也妄語戒者中央土德信而人妄語則脾受其辱脾屬土土信而有恒故言德也人之禀性以信爲本而人妄語則辱歸於己脾緫人身爲義也力一十二五徳相資不可虧缺虧謂廢也缺謂傷也言人受生必備此五徳五徳無虧則終享福吉故云不可虧缺者也老君曰此五失一則命不成向辯人身各有所生此名毀犯虧缺之咎故云命不成命不成者謂不全其性分及天年也元命包曰行正不過得壽命壽命正命是故不殺者乃至無有殺心夫殺心之起起於不戒遂至増甚今言乃至無有殺心者自微自防也自有雖不手殺或因人行殺或勸人行殺或看人行殺或使人行殺而心不爲惡皆同於殺也所以然者皆由有殺心若其不戒終不能成就者也不盗乃至無有邪取謂貪盗之人始於小𥨸小𥨸不戒遂至大取或因公利私或慿法招物或依恃勢力封山畋澤或誘說癡愚以役其力如此而得皆非正理同於盗故云乃至無有邪取明非正偷盗也貪婪皆是者也不婬乃至無有邪念婬者皆由放恣或男或女情慾不一㝷五戒之重莫過於婬亡身䘮家故不復論又有不畏罪網因法媾慾外託奉道内實婬濁如斯之徒實爲巨惡故云乃至無有邪念自非夫妻而行婬者皆爲邪也不酒乃至無有勢力夫酒致過或因尊上之所勸逼遂至亂失今以戒自持雖有勢力亦不違犯酒之傷人如火不救逾多逾盛不極而不止者也不妄語乃至無有漏泄真實之心則無私惡無私惡故無有隱諱無隱諱復何漏泄也如是可謂成也前云失一則命不成是理未曲備今既重說其義祖顯故云如是可謂成也老君曰戒中婬酒能生五惡婬則奢奢則貪貪則盗盗則欺欺則懼懼則殺此並婬之所能至也酒能發狂又能婬太清經云人身有三萬六千蟲皆在五藏皮膚之中飲酒則諸蟲嘇動嘇動則衆惡興衆惡興則無所不爲故云能生五惡也戒者戒惡也惡世之中男女讙婬罹於骨肉讙謂雜也罹謂犯也言婬慾之心人乃至不避姓族因法混雜無復分别者也上慢下暴毀篾天德上慢天靈爲篾下相殘害爲暴之者也沈酗爭訟禍命辱身沈猶耽也狂酒日酗對闘爲爭訴理爲訟害命爲禍䧟身爲辱也妄詐欺誑罔有所由妄謂妄語詐謂詐僞欺謂妄詐之人要求財利不顧在此三者也六親相盗非但於他夫婦父子兄弟六親也言爲盗者非但於他乃至子盗於父婦盗於夫兄弟相盗無所不爲殺害衆生利養身口殺生治病爲養身宰害供廚爲利口也如此等軰見生受業永墜諸苦生不受戒唯惡是行惡業増長則淪三塗備加五惡無有休限其有五惡者則入地獄備五苦之報無有休息及年限也經云三塗受報近者一劫如有出者言其受對或有輕重如有得竟還生人中者也當在邊夷短命傷殘邊夷俚獠也其人相食此謂殺害之報受生此地若生中國則短命及形體不具夫婦醜惡及不貞㢘婬報也醜謂可憎惡謂弊惡不貞爲婬不㢘謂貪也貧窮凍露在處不安如有財畜爲人所奪盗報也凍露謂居無屋宅不安謂飢寒不立縱有財物則被劫奪以償先債也言說不信人所不親妄語報也其所言說是之與非人皆不信既無信義寧得親友也意慮昏塞衆所慢輕酒報也生既昏濁死無神明此之受身豈得清靜故人所輕慢老君曰清信男清信女奉持戒行見世安樂無有憂惱奉戒持行所志者道衆惡既消長與善㑹復何憂惱哉夫憂惱者由於惡行故與惡相牽耳豈有不爲而至者邪衆所恭敬不婬則爲衆所敬也見者懽喜無復殺心故一切見之莫不懽喜者也常蒙利養不盗也既無邪取則人樂給與也一切歸仰不妄語也所言必實誰不歸仰其智深微不飲酒也則思慮安靜入於深微處在清靜四大完堅既受此五報行止所在人所敬愛常清靜不雜凡穢四體也外思不加則内府無傷表裏堅宻萬病不生也故能修集衆法以成道真前明無戒惡縁果報此明奉法見世受福乃至成道莫不由之又明爲道必修集衆善乃得成真故以法明道以真明人者也尹喜再拜曰敢問受持之法受當爲授戒法既備次問授持之儀也更起諮端故再拜而請老君曰若男子女人聞法生信歸身三寳此直云男子女人者緫謂始發心也法謂戒法也三寳亦曰三尊亦曰三師謂太上之法太上之法傳太上之法是爲三也故太上爲萬法之主傳法者爲衆學之師老君即此法之師餘法各隨所出即時稽顙言有欲發心者即時授與不待依違辯其由來所以者何戒本去惡但令有心何論徃行且人心多惑自有善機蹔起廻復退悔故承機而奬不待終日也歸身大道歸神大道歸命大道此三歸者謂身有善惡神有恐怖命有壽天盖一切衆生之必有也今以此三悉歸於道者謂受行法戒一則生死常善不墮惡縁二則神明强正不畏邪魔三則見世長壽不遭横夭歸雖有三其實一也向言歸身三寳是法此言大道是常即前頌云玄虚之道男子女人稱妵名以告誓捨世邪法捨猶離凡世間所爲悉是邪法奉持正戒如手持物恒畏遺失盡身盡命終不毀犯身語其行命言其識故盡犯二邊而不毀慢及虧犯也於是讃誦恭心而受讃誦五戒之事也謂受之身三歸既竟於三寳前稽顙自誓一一受解然後授之恭心者如對神也老君曰若復男子女人受正戒巳進求經法謂五千文者也先當受戒向言受戒巳今復云先當受戒前是受經之時更復說戒若經戒具受故宜先受戒一一堅淨然後授與辯覈巳持戒者若有漏失許其自新明知所以更授者也旦暮恭心不怠時節朝夕禮事雖復飢寒亦不闕廢此是奉經之法也月修十直月有十齋日也年用三齋一年用三月長齋也誦經萬遍白日登晨闇讀曰誦晨者真仙之域也用此齋直誦經萬過則獲飛仙西昇經云羅縷妙言内意不出誦文萬過精誠思徹此之義也十直三齋别自有經也若爲人敷說宣通妙義大利衆生乃㧞三塗一切諸苦敷揚講說開導未悟則功德廣濟三塗救㧞也以是功德能斷宿命無量諸根得昇上清無復退墮功圓德備則生死根㓕上清之道無復退轉此略明學道之所至也始自持戒終於無爲舉大法之始終者也老君曰清信男清信女在家出家受持經法願樂神仙日夜誦讀求諸妙義謂無爲至理也去諸諠雜調心制性謂即世學也夫上士學道在市朝下士逺處山林山林者謂垢穢尚多未能即諠爲靜故逺避人世以自調伏耳若即世而調㐲者則無待於山林者也柔顔善氣勸諸男女心麤則貌强意獷則言惡若和顏軟語則見者親愛不生忿心也逺離五惡受持五戒供養三寳既知至妙之理又能分别善惡則以我所得爲敷說勸令捨離諸惡縁也取令成就不擇甘苦識有利鈍性有善惡曲巳順彼取令入道不爲身利不辭屈辱此爲教也若具持大戒苦行精懃布施忍辱捨身救物謂修行者也大戒爲百八十太清等戒若四明科禁衆仙大忌皆是學真之具法也精進懃謂匪懈布施凡來求無不給與不吝財賄不問有無忍辱謂受辱不言乃至打罵亦無嗔恨捨謂見諸危難决徃救不顧身命若見凍餓剔身給與不待有求是爲捨也若復離世獨徃幽栖專想至寂衆難不驚謂耽神者也離世山栖以避諠濁獨徃無群無復他念專謂志一想謂思神至之者也寂謂定也此專定心智定内安非復外難榮辱所驚也必至無爲言修此等行必果無爲之真也尹喜曰奉經有犯乎持戒善惡既備於前夫知奉經凌犯罪失云何此緫問衆經非止五千也前頌云悉歸太上經此後又明破法及授受之難推此故知也斯乃尹喜相資發故令出罪福之事耳老子曰十有三者也經云生之徒十有三死之徒十有三言奉經順法則獲長生違戒犯惡則動之死地既答所問罪失故直云十三也尹喜曰何謂也問十三之事也老子曰爾諦聽之既更有所明故復戒十有三者六塵六識皆由於心六塵謂六入也以其所入能穢染正性故言塵也六識即六入之根能起分别故云識也心爲其主是爲十三下卷具解凡致惡之由因十三起入善之由因十三㓕入善爲生爲惡而死死生之謂非止此身也謂修善不巳以至成道成道之日豈得非生故經云出也爲惡不息遂淪地獄豈非死乎故經云入也是故淫貪疾恚淫之所起由於色取故在十三之端夫淫必有貪而貪者不必皆淫然貪之爲病非但在於富貴乃至貪名貪世不欲人在己先病者妬嫉也嫉彼而勝我也恚謂嗔恚也貪嫉既起嗔恚自生者也欺盗妄詐違戒取物是爲欺盗謂欺心者也自詭要時是爲妄詐是用權數苟得者也所謂民之賊矣綺言兩舌辭非而澤謂之綺言反覆是非是爲兩舌皆縁欺詐而有謟利持權口忌災祟明言禍福卑辭髙物以要利入是爲謟也慿恃時威自我制物是爲權也夫謟之甚者乃至祈神祭鬼以求曲祐也溷集破法男女無别爲溷破法者謂有此等事也始則貪婬終於混集並皆相因而至之也非清信也如此皆之死地尚非清信况復奉經者乎天網不失引經明事也夫天網雖踈報對之理必無遺失也生死無地生謂見報死謂考對無地可逃也答所問十三畢此以下乃明罪報也如此等人非其智分由無智識起諸罪業故於法無分也染洿至法毀廢善根法法相傳如樹有栽生長不絶是爲善根如此惡行日相深漬善根豈得不廢不爲善人之所知識所行既惡則惡惡相知愚下之𩔖自多黨善人謂才識髙明徳勝者也備衆生身皆由前縁無有慧業故令今生得此愚癡夫言愚癡者謂造諸惡業也非謂無所解矣生既無善死墮三塗受衆生身衆生萬等各隨縁報而備得其身者種於婬慾無所憎避衆生所以繁多由其種𩔖婬慾故也謂因法行婬而受此報猶雞犬等在於人中無所避就得𩔖便爲亦無憎愛皆由前業之所行者也常懷怖畏因往貪取之報也餓鬼之中復有萬品雖云是餓有時得足此言無足者便是未嘗蹔飽也若在地獄五痛無間地獄受苦有時而息此言無間是時無休息也五痛猶五苦也明三塗報應如此如此受身備諸苦惡三塗報盡出生人中則形體不具備諸殘疾或瘡痒疥癩可惡之極者也物所懷惡非但於人乃至畜生亦有憎惡無有救治疾既可惡則人無治者此是穢慢洿法之報應也生死輪轉無聞無見無聞謂不信法教無見謂不值善縁此緫明十三破法之罪生死所之也皆由一念中生至無數念其對無窮夫爲惡者始起原缺文太上老君戒經
